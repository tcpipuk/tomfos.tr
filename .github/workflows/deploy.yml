name: 🌐 Deploy Site

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: 📖 Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repo 📥
        uses: actions/checkout@v5

      - name: Setup Docker 🐳
        uses: docker/setup-buildx-action@v3

      - name: Restore cache 💾
        uses: actions/cache@v4
        with:
          path: .mkdocs-cache
          key: mkdocs-cache

      - name: Build MkDocs 🏗️
        run: |
          docker run --rm \
            --entrypoint /bin/sh \
            -v ${{ github.workspace }}:/docs \
            -v ${{ github.workspace }}/.mkdocs-cache:/docs/.cache \
            squidfunk/mkdocs-material \
            -c "pip install mkdocs-git-revision-date-localized-plugin && mkdocs build"
          sudo chown -R runner:docker ${{ github.workspace }}/site

      - name: Update Wrangler 📦
        run: npm install --save-dev wrangler@latest

      - name: Deploy to Pages 🚀
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=tomfostr --branch=${{ github.head_ref }} --commit-dirty=true

      - name: Output Summary 📊
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          echo "### Deployed URLs ✅️" >> $GITHUB_STEP_SUMMARY
          echo "- **🔗 Build URL:** [$ALIAS_URL]($ALIAS_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **🔗 Branch URL:** [$DEPLOY_URL]($DEPLOY_URL)" >> $GITHUB_STEP_SUMMARY
